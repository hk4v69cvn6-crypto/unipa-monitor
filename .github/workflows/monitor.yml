name: Monitor Bandi UniPa

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Installa Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le librerie necessarie
        run: pip install requests beautifulsoup4 anthropic

      - name: Esegui lo script di monitoraggio
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      - name: Salva memoria aggiornata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bandi_visti.json telegram_offset.json
          git diff --staged --quiet || git commit -m "Aggiorna memoria"
          git push
        continue-on-error: true

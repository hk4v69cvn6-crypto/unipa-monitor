name: Monitor Bandi UniPa

on:
  schedule:
    # Gira ogni giorno alle 9:00 UTC (le 11:00 ora italiana)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permette di avviarlo manualmente dal sito GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest  # computer virtuale con Linux

    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Installa Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le librerie necessarie
        run: pip install requests beautifulsoup4 anthropic

      - name: Esegui lo script di monitoraggio
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      - name: Salva la memoria aggiornata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiorna memoria bandi visti"
          file_pattern: bandi_visti.json
